name: shree_ganesh_autodeal_admin
description: Owner mobile app for Shree Ganesh Autodeal inventory and sales management.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http_parser: ^4.0.2
  share_plus: ^10.1.4
  google_fonts: ^6.3.1
  file_picker: ^11.0.2
  http: ^1.5.0
  intl: ^0.20.3
  image_picker: ^1.2.3
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
